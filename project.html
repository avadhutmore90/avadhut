<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Avadhut More - Futuristic Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-glow: linear-gradient(135deg, #00ddeb 0%, #0078d4 50%, #00d4ff 100%);
            --secondary-glow: linear-gradient(135deg, #ff6b6b 0%, #ffa726 50%, #ffcc02 100%);
            --tertiary-glow: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f472b6 100%);
            --neon-blue: #00ddeb;
            --neon-purple: #8b5cf6;
            --dark-bg: #0a0a0f;
            --glass-bg: rgba(255,255,255,0.05);
            --text-primary: #ffffff;
            --text-secondary: #b0b3b8;
            --border-glow: rgba(0,221,235,0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* NAVBAR - SAME AS ACADEMIC */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            padding: 15px 0;
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--primary-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 10px;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--primary-glow);
            border-radius: 25px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
            transform: scale(0.95);
        }

        .nav-links a:hover::before,
        .nav-links a.active::before {
            opacity: 0.25;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,221,235,0.4);
            border-color: rgba(0,221,235,0.3);
        }

        /* Background */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(120,119,198,0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255,119,198,0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(120,219,255,0.4) 0%, transparent 50%);
            animation: cosmicShift 25s ease-in-out
