<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Avadhut More - Futuristic Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-glow: linear-gradient(135deg, #00ddeb 0%, #0078d4 50%, #00d4ff 100%);
            --secondary-glow: linear-gradient(135deg, #ff6b6b 0%, #ffa726 50%, #ffcc02 100%);
            --tertiary-glow: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f472b6 100%);
            --quaternary-glow: linear-gradient(135deg, #10b981 0%, #059669 50%, #34d399 100%);
            --neon-blue: #00ddeb;
            --neon-purple: #8b5cf6;
            --neon-green: #10b981;
            --dark-bg: #0a0a0f;
            --glass-bg: rgba(255,255,255,0.05);
            --glass-bg-hover: rgba(255,255,255,0.1);
            --text-primary: #ffffff;
            --text-secondary: #b0b3b8;
            --border-glow: rgba(0,221,235,0.3);
            --success-glow: rgba(16,185,129,0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            padding: 15px 0;
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--primary-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 10px;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--primary-glow);
            border-radius: 25px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
            transform: scale(0.95);
        }

        .nav-links a:hover::before,
        .nav-links a.active::before {
            opacity: 0.25;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,221,235,0.4);
            border-color: rgba(0,221,235,0.3);
        }

        /* Background Effects */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,119,198,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 60%, rgba(16,185,129,0.2) 0%, transparent 50%);
            animation: cosmicShift 30s ease-in-out infinite;
        }

        @keyframes cosmicShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 25s infinite linear;
        }

        .particle:nth-child(odd) { 
            background: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
        }
        .particle:nth-child(even) { 
            background: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
        }

        .particle:nth-child(1) { width: 6px; height: 6px; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 4px; height: 4px; left: 25%; animation-delay: -6s; }
        .particle:nth-child(3) { width: 8px; height: 8px; left: 70%; animation-delay: -12s; }
        .particle:nth-child(4) { width: 5px; height: 5px; left: 90%; animation-delay: -18s; }
        .particle:nth-child(5) { width: 3px; height: 3px; left: 50%; animation-delay: -3s; }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; transform: translateY(90vh) scale(1) rotate(90deg); }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(0) rotate(360deg); opacity: 0; }
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            padding: 0 20px;
        }

        .hero-content h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 900;
            background: var(--primary-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            animation: glowPulse 3s ease-in-out infinite;
            position: relative;
        }

        .hero-content .subtitle {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto 3rem;
            line-height: 1.6;
        }

        @keyframes glowPulse {
            0%, 100% { 
                filter: drop-shadow(0 0 20px var(--neon-blue));
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 40px var(--neon-blue));
                transform: scale(1.02);
            }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 20px 80px;
        }

        /* Contact Grid */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            margin-top: 4rem;
            align-items: start;
        }

        /* Contact Info */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .contact-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--primary-glow);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .contact-item:hover::before {
            opacity: 0.1;
        }

        .contact-item:hover {
            transform: translateX(15px) rotate(1deg);
            box-shadow: 0 25px 50px rgba(0,221,235,0.3);
            border-color: var(--neon-blue);
        }

        .contact-icon {
            width: 70px;
            height: 70px;
            background: var(--primary-glow);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #000;
            flex-shrink: 0;
            box-shadow: 0 10px 30px rgba(0,221,235,0.4);
            transition: all 0.3s ease;
        }

        .contact-item:hover .contact-icon {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 15px 40px rgba(0,221,235,0.6);
        }

        .contact-details h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: var(--primary-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .contact-details p,
        .contact-details a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .contact-item:hover .contact-details p,
        .contact-item:hover .contact-details a {
            color: var(--text-primary);
        }

        /* Contact Form */
        .contact-form-container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .contact-form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--quaternary-glow);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .contact-form-container.form-success::before {
            transform: scaleX(1);
        }

        .form-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-header h3 {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 900;
            background: var(--quaternary-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .form-header p {
            color: var(--text-secondary);
        }

        .form-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 1.2rem 1.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-secondary);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
            background: rgba(255,255,255,0.05);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            background: var(--quaternary-glow);
            color: #000;
            border: none;
            padding: 1.2rem 2rem;
            border-radius: 25px;
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px var(--success-glow);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* Success Message */
        .success-message {
            display: none;
            background: rgba(16,185,129,0.2);
            border: 1px solid var(--neon-green);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .social-link {
            width: 60px;
            height: 60px;
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-size: 1.4rem;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .social-link:hover {
            background: var(--primary-glow);
            color: #000;
            transform: translateY(-8px) rotate(5deg);
            box-shadow: 0 15px 35px rgba(0,221,235,0.4);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 3rem;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 100px 15px 60px;
            }
            
            .contact-form-container {
                padding: 2rem;
            }
            
            .contact-item {
                padding: 1.5rem;
            }
            
            .nav-links {
                gap: 5px;
            }
            
            .nav-links a {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
        }

        /* Scroll Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1s ease;
        }

        .fade-in.visible {
