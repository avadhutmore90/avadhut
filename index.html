        font-size: 1.2em;
        border: none;
        border-radius: 8px;
        background-color: white;
        color: #4CAF50;
        cursor: pointer;
        transition: transform 0.3s, background-color 0.3s, color 0.3s;
    }
    button:hover {
        transform: scale(1.1);
        background-color: #4CAF50;
        color: white;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-50px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
